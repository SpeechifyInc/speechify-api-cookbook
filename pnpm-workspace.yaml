# pnpm workspace for the Speechify Cookbook.
# JavaScript/TypeScript recipes live under recipes/<product>/typescript/<recipe>.
# Python recipes are managed independently with uv (see agents/python-recipes.md).
packages:
  - "recipes/*/typescript/*"
  - "templates/typescript/*"

# Single source of truth for shared dependency versions.
# Recipes reference these with "catalog:" instead of pinning their own.
catalog:
  "@speechify/api": ^1.0.1
  tsx: ^4.19.2
  typescript: ^5.7.2
  "@types/node": ^22.10.2
  dotenv: ^16.4.7
